name: CI

permissions:
  contents: read

env:
  # Keep CI aligned with the local development environment and release build.
  PYTHON_VERSION: '3.11'

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    # Samsara is Windows-only and imports Win32, WinRT, WASAPI, and UI
    # Automation dependencies during collection. Linux cannot exercise the
    # supported runtime and fails before the meaningful suites can run.
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # Install the pinned CPU builds first so pip does not resolve a
          # multi-gigabyte CUDA-enabled torch build on the hosted runner.
          python -m pip install torch==2.5.1 torchaudio==2.5.1 --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-test.txt

      - name: Run tests with coverage
        shell: pwsh
        run: python -m pytest --cov=. --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true
